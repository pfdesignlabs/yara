key: digid
label: DigiD
allowed_domains:
  - www.digid.nl
languages:
  - nl
  - en
journeys_supported:
  - digid_help
zones:
  - key: aanvragen_activeren
    label: Aanvragen en activeren
    user_need_summary: >-
      Helpt gebruikers die DigiD nog moeten aanvragen, een activeringscode hebben ontvangen,
      of niet weten welke stap nu volgt in het aanvragen- of activeringsproces.
    seed_urls:
      - https://www.digid.nl/
      - https://www.digid.nl/aanvragen-en-activeren/digid-aanvragen
      - https://www.digid.nl/aanvragen-en-activeren/digid-activeren
      - https://www.digid.nl/aanvragen-en-activeren/code-ontvangen
    include_url_patterns:
      - /aanvragen-en-activeren/
    exclude_url_patterns:
      - "?"
      - "#"
      - /search
      - /zoeken
      - /api/
      - /_next/
    content_roles:
      - procedural
      - explanatory
      - support
    max_depth: 2
    max_pages: 20
  - key: account_toegang_herstel
    label: Account, toegang en herstel
    user_need_summary: >-
      Helpt gebruikers die al verder zijn in DigiD maar vastlopen op inloggen, sms-codes,
      wachtwoord, gebruikersnaam of herstel van toegang.
    seed_urls:
      - https://www.digid.nl/inloggen
      - https://www.digid.nl/wachtwoord-vergeten
      - https://www.digid.nl/gebruikersnaam-vergeten
      - https://www.digid.nl/inlogmethodes/sms-controle
      - https://www.digid.nl/inlogmethodes/digid-app
    include_url_patterns:
      - /inlogmethodes/
      - /wachtwoord
      - /gebruikersnaam
      - /inloggen
    exclude_url_patterns:
      - "?"
      - "#"
      - /search
      - /zoeken
      - /api/
      - /_next/
    content_roles:
      - procedural
      - support
    max_depth: 2
    max_pages: 20
