key: rijksoverheid
label: Rijksoverheid
allowed_domains:
  - www.rijksoverheid.nl
languages:
  - nl
journeys_supported:
  - digid_help
zones:
  - key: brp_en_inschrijving
    label: BRP en inschrijving
    user_need_summary: >-
      Helpt gebruikers begrijpen wat de BRP is, waarom inschrijving nodig is,
      en hoe dit samenhangt met DigiD en andere overheidszaken.
    seed_urls:
      - https://www.rijksoverheid.nl/onderwerpen/privacy-en-persoonsgegevens/basisregistratie-personen-brp
      - https://www.rijksoverheid.nl/onderwerpen/gemeenten/vraag-en-antwoord/waar-moet-ik-mij-inschrijven-als-ik-in-nederland-kom-wonen
    include_url_patterns:
      - /basisregistratie-personen-brp
      - /gemeenten/
      - /vraag-en-antwoord/
    exclude_url_patterns:
      - "?"
      - "#"
      - /search
      - /zoeken
    content_roles:
      - explanatory
      - procedural
    max_depth: 1
    max_pages: 12
  - key: briefadres_en_geen_vast_adres
    label: Briefadres en geen vast adres
    user_need_summary: >-
      Helpt gebruikers zonder vast woonadres begrijpen wat een briefadres is en welke
      mogelijkheden of beperkingen er zijn voor registratie en overheidscommunicatie.
    seed_urls:
      - https://www.rijksoverheid.nl/onderwerpen/gemeenten/vraag-en-antwoord/kan-ik-een-briefadres-krijgen-als-ik-geen-vast-woonadres-heb
    include_url_patterns:
      - /briefadres
      - /geen-vast-woonadres
      - /gemeenten/
      - /vraag-en-antwoord/
    exclude_url_patterns:
      - "?"
      - "#"
      - /search
      - /zoeken
    content_roles:
      - explanatory
      - procedural
      - support
    max_depth: 1
    max_pages: 10
