name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.14"
      - run: ruff check .
      - run: ruff format --check .

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  changelog:
    name: CHANGELOG entry required for feat/fix
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check that feat/fix commits update CHANGELOG.md
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if git log --format=%s "$BASE_SHA..$HEAD_SHA" | grep -qE '^(feat|fix)(\(.+\))?:'; then
            if ! git diff --name-only "$BASE_SHA..$HEAD_SHA" | grep -qx 'CHANGELOG.md'; then
              echo "::error::PR contains feat: or fix: commits but does not modify CHANGELOG.md."
              echo "Add an entry under [Unreleased] in CHANGELOG.md before merging."
              exit 1
            fi
          fi
